<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lee Dulcio — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #050505;
      --surface: #0e0e0e;
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.08);
      --accent-border: rgba(0, 255, 136, 0.2);
      --text: #bbb;
      --text-white: #f0f0f0;
      --border: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      padding: 40px 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,255,136,0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    .back {
      text-align: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .back a {
      color: #555;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 2px;
      transition: color 0.2s;
    }

    .back a:hover {
      color: var(--accent);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--accent);
      font-size: 3rem;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
    }

    .page-header p {
      color: #3a3a3a;
      font-size: 0.75rem;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0,255,136,0.4);
      margin: 16px auto;
      border-radius: 2px;
    }

    /* Section titles */
    .section-title {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 28px;
      margin-top: 36px;
    }

    /* Project cards */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 32px;
      transition: border-color 0.2s, background 0.2s;
    }

    .project-card:hover {
      border-color: var(--accent-border);
      background: #111;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .project-title {
      color: var(--text-white);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .project-link {
      color: var(--accent);
      font-size: 0.78rem;
      text-decoration: none;
      white-space: nowrap;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .project-link:hover {
      opacity: 1;
    }

    .project-role {
      font-size: 0.78rem;
      color: var(--accent);
      opacity: 0.65;
      font-style: italic;
      margin-bottom: 12px;
    }

    .project-description {
      font-size: 0.85rem;
      line-height: 1.7;
      color: #999;
      margin-bottom: 16px;
    }

    .project-outcome {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 16px;
      padding-left: 14px;
      border-left: 2px solid var(--accent-border);
      line-height: 1.6;
    }

    .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-tag {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: #777;
      letter-spacing: 0.5px;
      transition: border-color 0.2s, color 0.2s;
      cursor: default;
    }

    .tool-tag:hover {
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* Tools grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .tool-category {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 22px 24px;
    }

    .tool-category h3 {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
      margin-bottom: 14px;
    }

    .tool-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-item {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-size: 0.78rem;
      color: #999;
    }

    /* Loading / error state */
    .status-msg {
      text-align: center;
      color: #333;
      font-size: 0.85rem;
      padding: 40px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="index.html">← Back to Home</a>
  </div>

  <div class="container">
    <div class="page-header">
      <h1>PORTFOLIO</h1>
      <div class="divider"></div>
      <p>Projects & Tools — Lee Dulcio</p>
    </div>

    <div class="section-title">Featured Projects</div>
    <div class="projects-grid" id="projects-grid">
      <div class="status-msg">Loading projects...</div>
    </div>

    <div class="section-title">Tools & Technologies</div>
    <div class="tools-grid" id="tools-grid">
      <div class="status-msg">Loading tools...</div>
    </div>
  </div>

  <script>
    fetch('projects.json')
      .then(res => {
        if (!res.ok) throw new Error('Failed to load data');
        return res.json();
      })
      .then(data => {
        renderProjects(data.projects);
        renderTools(data.tools);
      })
      .catch(() => {
        document.getElementById('projects-grid').innerHTML =
          '<div class="status-msg">Could not load projects.</div>';
        document.getElementById('tools-grid').innerHTML =
          '<div class="status-msg">Could not load tools.</div>';
      });

    function renderProjects(projects) {
      const grid = document.getElementById('projects-grid');
      if (!projects || projects.length === 0) {
        grid.innerHTML = '<div class="status-msg">No projects yet.</div>';
        return;
      }
      grid.innerHTML = projects.map(p => `
        <div class="project-card">
          <div class="project-header">
            <span class="project-title">${escHtml(p.title)}</span>
            ${p.link ? `<a class="project-link" href="${escHtml(p.link)}" target="_blank" rel="noopener">
              <i class="fas fa-external-link-alt"></i> View
            </a>` : ''}
          </div>
          ${p.role ? `<div class="project-role">${escHtml(p.role)}</div>` : ''}
          <div class="project-description">${escHtml(p.description)}</div>
          ${p.outcome ? `<div class="project-outcome">${escHtml(p.outcome)}</div>` : ''}
          <div class="tool-tags">
            ${(p.tools || []).map(t => `<span class="tool-tag">${escHtml(t)}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderTools(categories) {
      const grid = document.getElementById('tools-grid');
      if (!categories || categories.length === 0) {
        grid.innerHTML = '<div class="status-msg">No tools listed yet.</div>';
        return;
      }
      grid.innerHTML = categories.map(cat => `
        <div class="tool-category">
          <h3>${escHtml(cat.category)}</h3>
          <div class="tool-list">
            ${(cat.items || []).map(item => `<span class="tool-item">${escHtml(item)}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
