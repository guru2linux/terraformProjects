<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lee Dulcio — Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #ccc;
      padding: 40px 20px;
    }

    .back {
      text-align: center;
      margin-bottom: 28px;
    }

    .back a {
      color: #4f8ef7;
      text-decoration: none;
      font-size: 0.88rem;
      letter-spacing: 1px;
    }

    .back a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .page-header h1 {
      color: #fff;
      font-size: 2.4rem;
      letter-spacing: 3px;
    }

    .page-header p {
      color: #888;
      font-size: 0.9rem;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #4f8ef7;
      margin: 16px auto;
      border-radius: 2px;
    }

    /* Section titles */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #4f8ef7;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 10px;
      margin-bottom: 28px;
      margin-top: 52px;
    }

    /* Project cards */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .project-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px 32px;
      transition: border-color 0.2s;
    }

    .project-card:hover {
      border-color: #4f8ef7;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .project-title {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .project-link {
      color: #4f8ef7;
      font-size: 0.82rem;
      text-decoration: none;
      white-space: nowrap;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .project-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .project-role {
      font-size: 0.82rem;
      color: #4f8ef7;
      font-style: italic;
      margin-bottom: 12px;
    }

    .project-description {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #bbb;
      margin-bottom: 16px;
    }

    .project-outcome {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 16px;
      padding-left: 14px;
      border-left: 2px solid #4f8ef7;
      line-height: 1.6;
    }

    .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-tag {
      background: #242424;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    /* Tools grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .tool-category {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 22px 24px;
    }

    .tool-category h3 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4f8ef7;
      margin-bottom: 14px;
    }

    .tool-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-item {
      background: #242424;
      border: 1px solid #2e2e2e;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.82rem;
      color: #bbb;
    }

    /* Loading / error state */
    .status-msg {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      padding: 40px;
    }
  </style>
</head>
<body>

  <div class="back">
    <a href="index.html">← Back to Home</a>
  </div>

  <div class="container">
    <div class="page-header">
      <h1>PORTFOLIO</h1>
      <div class="divider"></div>
      <p>Projects & Tools — Lee Dulcio</p>
    </div>

    <div class="section-title">Featured Projects</div>
    <div class="projects-grid" id="projects-grid">
      <div class="status-msg">Loading projects...</div>
    </div>

    <div class="section-title">Tools & Technologies</div>
    <div class="tools-grid" id="tools-grid">
      <div class="status-msg">Loading tools...</div>
    </div>
  </div>

  <script>
    fetch('projects.json')
      .then(res => {
        if (!res.ok) throw new Error('Failed to load data');
        return res.json();
      })
      .then(data => {
        renderProjects(data.projects);
        renderTools(data.tools);
      })
      .catch(() => {
        document.getElementById('projects-grid').innerHTML =
          '<div class="status-msg">Could not load projects.</div>';
        document.getElementById('tools-grid').innerHTML =
          '<div class="status-msg">Could not load tools.</div>';
      });

    function renderProjects(projects) {
      const grid = document.getElementById('projects-grid');
      if (!projects || projects.length === 0) {
        grid.innerHTML = '<div class="status-msg">No projects yet.</div>';
        return;
      }
      grid.innerHTML = projects.map(p => `
        <div class="project-card">
          <div class="project-header">
            <span class="project-title">${escHtml(p.title)}</span>
            ${p.link ? `<a class="project-link" href="${escHtml(p.link)}" target="_blank" rel="noopener">
              <i class="fas fa-external-link-alt"></i> View
            </a>` : ''}
          </div>
          ${p.role ? `<div class="project-role">${escHtml(p.role)}</div>` : ''}
          <div class="project-description">${escHtml(p.description)}</div>
          ${p.outcome ? `<div class="project-outcome">${escHtml(p.outcome)}</div>` : ''}
          <div class="tool-tags">
            ${(p.tools || []).map(t => `<span class="tool-tag">${escHtml(t)}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderTools(categories) {
      const grid = document.getElementById('tools-grid');
      if (!categories || categories.length === 0) {
        grid.innerHTML = '<div class="status-msg">No tools listed yet.</div>';
        return;
      }
      grid.innerHTML = categories.map(cat => `
        <div class="tool-category">
          <h3>${escHtml(cat.category)}</h3>
          <div class="tool-list">
            ${(cat.items || []).map(item => `<span class="tool-item">${escHtml(item)}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
