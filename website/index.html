<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lee Dulcio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      text-align: center;
      padding: 60px 80px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      color: #ffffff;
      font-size: 2.8rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #4f8ef7;
      margin: 16px auto 32px;
      border-radius: 2px;
    }

    .icons {
      display: flex;
      gap: 32px;
      justify-content: center;
    }

    .icons a {
      color: #888;
      font-size: 2rem;
      transition: color 0.2s, transform 0.2s;
      text-decoration: none;
    }

    .icons a:hover {
      transform: translateY(-4px);
    }

    .icons a.github:hover  { color: #ffffff; }
    .icons a.facebook:hover { color: #1877f2; }
    .icons a.instagram:hover { color: #e1306c; }
    .icons a.linkedin:hover  { color: #0a66c2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lee Dulcio</h1>
    <div class="divider"></div>
    <div class="icons">
      <a href="#" class="github" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="#" class="facebook" aria-label="Facebook">
        <i class="fab fa-facebook"></i>
      </a>
      <a href="#" class="instagram" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="#" class="linkedin" aria-label="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
    </div>
  </div>
</body>
</html>
