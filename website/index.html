<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lee Dulcio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      text-align: center;
      padding: 60px 80px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      color: #ffffff;
      font-size: 2.8rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #4f8ef7;
      margin: 16px auto 32px;
      border-radius: 2px;
    }

    .icons {
      display: flex;
      gap: 32px;
      justify-content: center;
    }

    .icons a {
      color: #888;
      font-size: 2rem;
      transition: color 0.2s, transform 0.2s;
      text-decoration: none;
    }

    .icons a:hover {
      transform: translateY(-4px);
    }

    .icons a.github:hover  { color: #ffffff; }
    .icons a.facebook:hover { color: #1877f2; }
    .icons a.youtube:hover  { color: #ff0000; }
    .icons a.linkedin:hover  { color: #0a66c2; }

    .nav-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .resume-link {
      display: inline-block;
      padding: 8px 24px;
      border: 1px solid #4f8ef7;
      border-radius: 6px;
      color: #4f8ef7;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    .resume-link:hover {
      background: #4f8ef7;
      color: #0f0f0f;
    }
</style>
</head>
<body>
  <div class="card">
    <h1>Lee Dulcio</h1>
    <div class="divider"></div>
    <div class="nav-links">
      <a href="resume.html" class="resume-link">View Resume</a>
      <a href="portfolio.html" class="resume-link">Portfolio</a>
      <a href="contact.html" class="resume-link">Contact</a>
    </div>
    <div class="icons">
      <a href="https://guru2linux.github.io/vuln-analysis-blog/" target="_blank" class="github" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://www.facebook.com/people/EELNice/100067874862744/" class="facebook" target="_blank" aria-label="Facebook">
        <i class="fab fa-facebook"></i>
      </a>
      <a href="https://www.youtube.com/@leedulcio9989" target="_blank" class="youtube" aria-label="YouTube">
        <i class="fab fa-youtube"></i>
      </a>
      <a href="https://www.linkedin.com/in/leedulcio" target="_blank" class="linkedin" aria-label="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
    </div>
  </div>
</body>
</html>
