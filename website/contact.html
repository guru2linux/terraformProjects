<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lee Dulcio — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --surface: #0e0e0e;
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.08);
      --accent-border: rgba(0, 255, 136, 0.2);
      --border: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: #bbb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,255,136,0.05) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at center, transparent 30%, #050505 100%);
      pointer-events: none;
      z-index: 0;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
    }

    .back a {
      color: #3a3a3a;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 2px;
      transition: color 0.2s;
    }

    .back a:hover { color: var(--accent); }

    .card {
      background: var(--surface);
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 50px 56px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--accent);
      font-size: 2.4rem;
      letter-spacing: 4px;
      text-align: center;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
      margin-bottom: 6px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0,255,136,0.4);
      border-radius: 2px;
      margin: 14px auto 10px;
    }

    .guest-count {
      text-align: center;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 1px;
      margin-bottom: 36px;
      min-height: 18px;
    }

    .guest-count span {
      color: var(--accent);
      font-weight: 500;
    }

    label {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    input, textarea {
      width: 100%;
      background: #080808;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #ddd;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-border);
    }

    textarea { min-height: 120px; }

    button {
      margin-top: 28px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--accent-border);
      border-radius: 3px;
      color: var(--accent);
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 18px;
      font-size: 0.78rem;
      text-align: center;
      min-height: 20px;
      letter-spacing: 0.5px;
    }

    .feedback.success { color: #00ff88; }
    .feedback.error   { color: #e05a5a; }
  </style>
</head>
<body>

  <div class="back">
    <a href="index.html">← Home</a>
  </div>

  <div class="card">
    <h1>CONTACT</h1>
    <div class="divider"></div>
    <div class="guest-count" id="guest-count">&nbsp;</div>

    <form id="contact-form" novalidate>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="How can I help?" required></textarea>

      <button type="submit" id="submit-btn">Send Message</button>
    </form>

    <div class="feedback" id="feedback"></div>
  </div>

  <script>
    const API = '/api/contact';

    function parseJSON(text) {
      if (!text || !text.trim()) throw new Error('Empty response from server.');
      return JSON.parse(text);
    }

    function setCount(n) {
      const el = document.getElementById('guest-count');
      if (n > 0) {
        el.innerHTML = `<span>${n}</span> ${n === 1 ? 'person has' : 'people have'} reached out`;
      } else {
        el.textContent = 'Be the first to reach out';
      }
    }

    // Load guest count on page load — silent on failure
    fetch(API)
      .then(r => r.text())
      .then(text => { setCount(parseJSON(text).count || 0); })
      .catch(() => { setCount(0); });

    // Form submit
    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const btn     = document.getElementById('submit-btn');
      const fb      = document.getElementById('feedback');

      fb.className = 'feedback';
      fb.textContent = '';

      if (!name || !email || !message) {
        fb.className = 'feedback error';
        fb.textContent = 'Please fill out all fields.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, message }),
      })
        .then(r => r.text().then(text => ({ status: r.status, text })))
        .then(({ status, text }) => {
          const data = parseJSON(text);
          if (data.success) {
            fb.className = 'feedback success';
            fb.textContent = "Message sent — I'll be in touch.";
            document.getElementById('contact-form').reset();
            setCount(data.count || 1);
          } else {
            throw new Error(data.error || `Server error (${status})`);
          }
        })
        .catch(err => {
          fb.className = 'feedback error';
          fb.textContent = err.message || 'Something went wrong. Please try again.';
        })
        .finally(() => {
          btn.disabled = false;
          btn.textContent = 'Send Message';
        });
    });
  </script>

</body>
</html>
